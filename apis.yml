aid: amazon-iot-events
name: Amazon IoT Events
description: >-
  AWS IoT Events is a fully managed IoT service that makes it easy to detect
  and respond to events from IoT sensors and applications. It enables you to
  monitor your equipment or device fleets for failures or changes in operation,
  and trigger actions when such events occur.
